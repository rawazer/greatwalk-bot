# GreatWalkBot trip configuration
# Copy to config.yaml and adjust for your trip.

polling_interval: 300  # seconds between checks

trip:
  name: New Zealand Honeymoon

party:
  adults: 2

travel_window:
  start: 2026-11-29
  end: 2026-12-31

tracks:
  - track: milford
    priority: 100
    complete_itinerary_only: true
    preferred_start_dates:
      - 2026-12-07
      - 2026-12-08
      - 2026-12-09
    acceptable_start_range:
      start: 2026-12-03
      end: 2026-12-23

  - track: routeburn
    priority: 90
    direction: either
    complete_itinerary_only: true
    preferred_start_range:
      start: 2026-12-06
      end: 2026-12-14
    acceptable_start_range:
      start: 2026-12-03
      end: 2026-12-23

  - track: kepler
    priority: 80
    complete_itinerary_only: true
    preferred_start_range:
      start: 2026-12-10
      end: 2026-12-18
    acceptable_start_range:
      start: 2026-12-03
      end: 2026-12-23

# Optional retry policy for transient fetch failures
retry:
  max_attempts: 3
  base_delay_seconds: 1.0
  max_delay_seconds: 60.0

# Optional trip-fit feasibility checks for multi-walk trips
trip_fit:
  enabled: true
  min_rest_days_between_walks: 1
  buffer_days_before_first_walk: 1
  buffer_days_after_last_walk: 1

# Optional notifications (Telegram secrets via environment variables only)
notifications:
  console: true
  telegram:
    enabled: false
    bot_token_env: GREATWALKBOT_TELEGRAM_BOT_TOKEN
    chat_id_env: GREATWALKBOT_TELEGRAM_CHAT_ID

# Optional: data source (playwright or http). CLI --source overrides this.
# source: playwright

