# Example GreatWalkBot watch configuration.
# Copy to config.yaml and adjust for your trip.

party_size: 2
polling_interval: 300  # seconds between checks

tracks:
  - track: milford
    preferred:
      - from: 2026-12-07
        to: 2026-12-14
    acceptable:
      - from: 2026-12-01
        to: 2026-12-31

  - track: routeburn
    preferred:
      - from: 2026-10-01
        to: 2026-10-07
    acceptable:
      - from: 2026-09-15
        to: 2026-11-30

# Optional: data source (playwright or http). CLI --source overrides this.
# source: playwright
